apiVersion: apps/v1
kind: Deployment
metadata:
  name: __SVC__
  namespace: __SVC__
  labels:
    app.kubernetes.io/name: __SVC__
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: __SVC__
  template:
    metadata:
      labels:
        app.kubernetes.io/name: __SVC__
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: __SVC__
          image: __SVC__
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HTTP_PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
