apiVersion: apps/v1
kind: Deployment
metadata:
  name: __SVC__
  namespace: __SVC__
  labels:
    app.kubernetes.io/name: __SVC__
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: __SVC__
  template:
    metadata:
      labels:
        app.kubernetes.io/name: __SVC__
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: __SVC__
          image: __SVC__
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: HTTP_PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
