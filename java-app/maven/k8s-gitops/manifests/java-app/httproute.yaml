apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: __SVC__
  namespace: __SVC__
spec:
  parentRefs:
    - name: public-gateway
      namespace: istio-system
      sectionName: https-wildcard
  hostnames:
    - api.ggang.cloud
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/__SVC__
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: __SVC__
          port: 8080
